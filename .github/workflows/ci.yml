name: CI

# Run on every push and on pull requests targeting master/main.
on:
  push:
    branches: [master, main]
  pull_request:
  # Weekly govulncheck scan catches new vulnerabilities even when the code hasn't changed.
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 UTC

permissions:
  contents: read
  issues: write

jobs:
  # Run the full test suite with race detection and generate a coverage report.
  # Matrix tests across supported Go versions since this is a library.
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version:
          - "1.21"
          - "1.22"
          - "1.23"
          - "1.24"
          - "1.25"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      # Verify dependency checksums match go.sum (detects corrupted or tampered modules).
      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      # Print coverage summary to the CI log (latest Go version only).
      - name: Coverage summary
        if: matrix.go-version == '1.25'
        run: go tool cover -func=coverage.out | tail -1

  # Static analysis: go vet for built-in checks, golangci-lint for extended linting.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run go vet
        run: go vet ./...

      # golangci-lint v2 runs 50+ linters in a single pass.
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

  # Verify the project compiles on the minimum supported Go version.
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

  # Scan dependencies for known vulnerabilities using Go's official scanner.
  # See https://pkg.go.dev/golang.org/x/vuln/cmd/govulncheck
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  # Open a GitHub issue when the scheduled scan finds vulnerabilities.
  # Only runs on cron failures — PR and push failures are visible in the checks UI.
  notify:
    needs: govulncheck
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'schedule'
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'govulncheck: vulnerability detected',
              body: [
                'The weekly [govulncheck scan](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') found vulnerabilities.',
                '',
                'Review the workflow run and update affected dependencies.'
              ].join('\n'),
              labels: ['security']
            });
